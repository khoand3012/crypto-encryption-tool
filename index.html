<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Encrypt/Decrypt Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 800px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .section {
      margin-bottom: 30px;
    }

    .section h2 {
      color: #667eea;
      font-size: 20px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 20px;
      background: #667eea;
      border-radius: 2px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-right: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .output {
      background: #f5f5f5;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      word-wrap: break-word;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }

    .output.error {
      background: #fee;
      border-color: #fcc;
      color: #c00;
    }

    .output.success {
      background: #efe;
      border-color: #cfc;
      color: #060;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #e0e0e0, transparent);
      margin: 30px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Crypto Demo</h1>
    <p class="subtitle">Test AES-256-GCM encryption and decryption with dynamic key derivation</p>

    <div class="section">
      <h2>Encrypt</h2>
      <div class="input-group">
        <label for="uid">X-UID:</label>
        <input type="text" id="uid" placeholder="my_uid">
      </div>
      <div class="input-group">
        <label for="requestId">Request ID:</label>
        <input type="text" id="requestId" value="req_12345" placeholder="req_12345">
      </div>
      <div class="button-group">
        <button id="encryptBtn">Encrypt</button>
      </div>
      <div class="input-group" style="margin-top: 15px;">
        <label>Encrypted Packet:</label>
        <div id="encryptOutput" class="output">Click "Encrypt" to see the result...</div>
        <button id="copyToClipboardBtn" style="background: #888; margin-top: 10px;">Copy to Clipboard</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <h2>Decrypt</h2>
      <div class="input-group">
        <label for="packetInput">Encrypted Packet (JSON):</label>
        <textarea id="packetInput" placeholder='Paste encrypted packet here...'></textarea>
      </div>
      <div class="button-group">
        <button id="decryptBtn">Decrypt</button>
        <button id="copyEncryptedBtn" style="background: #888;">Copy Encrypted Packet</button>
      </div>
      <div class="input-group" style="margin-top: 15px;">
        <label>Decrypted Result:</label>
        <div id="decryptOutput" class="output">Click "Decrypt" to see the result...</div>
      </div>
    </div>
  </div>

  <script type="module" src="/main.ts"></script>
</body>
</html>
